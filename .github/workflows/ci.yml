name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MoonBit
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s -- '0.9.2+bbe2b338f'
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain version
        run: moon version

      - name: Check formatting
        run: moon fmt --check

      - run: moon update

      - name: Typecheck
        run: moon check

      - name: Run tests
        run: moon test
